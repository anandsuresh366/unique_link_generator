<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

background:linear-gradient(270deg,#1A2517,#241125,#222222,#000F08);
background-size:800% 800%;
animation:bgmove 6s ease infinite;
overflow:hidden;
padding:20px;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* particles */

#particles-js{
position:absolute;
width:100%;
height:100%;
z-index:0;
}

/* card */

.container{
position:relative;
z-index:2;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

padding:50px 60px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.5);

color:white;
max-width:600px;
width:100%;
}

/* title */

h1{
font-size:34px;
margin:10px 0;

text-shadow:
0 0 10px #ff4e50,
0 0 20px #ff4e50,
0 0 40px #ff4e50;
}

/* typing */

.typing{
margin-top:15px;
font-size:18px;
color:#eee;
line-height:1.6;
min-height:24px;
}

/* lock */

.lock3d{
width:110px;
height:110px;
margin:auto;
margin-bottom:25px;
position:relative;
transform-style:preserve-3d;
animation:lockSpin 3s ease forwards;
}

@keyframes lockSpin{
0%{transform:rotateY(0deg) scale(.6);}
50%{transform:rotateY(180deg) scale(1.1);}
100%{transform:rotateY(360deg) scale(1);}
}

.lock-body{
width:70px;
height:55px;
background:#ff4e50;
border-radius:10px;
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
}

.shackle{
width:55px;
height:45px;
border:7px solid #ff4e50;
border-bottom:none;
border-radius:30px 30px 0 0;

position:absolute;
top:0;
left:50%;

transform-origin:center;
transform:translateX(-50%) rotate(-45deg);

animation:lockClose 2s ease forwards;
}

@keyframes lockClose{
0%{transform:translateX(-50%) rotate(-45deg);}
70%{transform:translateX(-50%) rotate(10deg);}
100%{transform:translateX(-50%) rotate(0deg);}
}

/* ---------- RESPONSIVE ---------- */

/* Tablet */

@media (max-width:900px){

.container{
padding:40px 40px;
}

h1{
font-size:28px;
}

.typing{
font-size:16px;
}

.lock3d{
width:95px;
height:95px;
}

}

/* Mobile */

@media (max-width:600px){

.container{
padding:30px 25px;
}

h1{
font-size:24px;
}

.typing{
font-size:15px;
}

.lock3d{
width:80px;
height:80px;
margin-bottom:20px;
}

}

/* Small mobile */

@media (max-width:400px){

h1{
font-size:20px;
}

.typing{
font-size:14px;
}

}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="lock3d">
<div class="shackle"></div>
<div class="lock-body"></div>
</div>

<h1>DEVICE LIMIT REACHED</h1>

<p id="typingText" class="typing"></p>

</div>

<audio id="lockSound">
<source src="https://www.soundjay.com/mechanical/lock-1.mp3" type="audio/mpeg">
</audio>

<script>

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
});

/* typing animation */

const text="This link has reached its maximum allowed devices. Please contact the owner for access.";

let i=0;

function typeEffect(){
if(i<text.length){
document.getElementById("typingText").innerHTML+=text.charAt(i);
i++;
setTimeout(typeEffect,35);
}
}

typeEffect();

/* lock sound */

setTimeout(()=>{
document.getElementById("lockSound").play();
},1500);

</script>

</body>
</html>
